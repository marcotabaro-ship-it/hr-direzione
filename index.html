  <style>

    .tinfo{flex:1;overflow:hidden;}

    .tdsc{color:rgba(255,255,255,.82);font-size:13px;margin:0;}

    .stamp-sub{font-size:13px;color:#64748B;margin:0;}
    .stamp-arr{width:22px;height:22px;fill:#CBD5E1;margin-right:14px;flex-shrink:0;}
    .swrap{position:relative;margin-bottom:14px;}
    .sico{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;fill:#94A3B8;}
    .sinp{width:100%;padding:16px 16px 16px 46px;border:1.5px solid #E2E8F0;border-radius:14px;font-size:16px;background:white;outline:none;transition:border-color .2s;box-shadow:0 1px 4px rgba(0,0,0,.04);}

    .shov{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
    .shov.open{opacity:1;pointer-events:auto;}
    .sheet{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,16px);-webkit-overflow-scrolling:touch;}
    .sheet.open{transform:translateY(0);}
    .shandle{width:36px;height:4px;background:#CBD5E1;border-radius:2px;margin:12px auto 0;}
    .shhdr{padding:16px 20px 12px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center;}
    .shhtitle{font-size:20px;font-weight:800;}
    .shclose{width:34px;height:34px;border-radius:50%;background:#F1F5F9;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .shclose svg{width:18px;height:18px;fill:#64748B;}
    .shbody{padding:16px 20px 8px;}
    .dlbl{font-size:10px;font-weight:800;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 5px;padding-bottom:4px;border-bottom:1px solid #F1F5F9;}
    .dval{font-size:15px;color:#1A202C;line-height:1.7;white-space:pre-wrap;margin:0 0 4px;}
    .pwdmod{position:fixed;inset:0;z-index:9998;background:rgba(15,23,42,.55);display:none;align-items:flex-end;}
    .pwdmod.open{display:flex;}
    .pwdinner{background:white;border-radius:24px 24px 0 0;padding:24px 24px 8px;width:100%;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));}
    .pwdtitle{font-size:20px;font-weight:800;margin:0 0 20px;}
    .pwderr{background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:12px 16px;color:#DC2626;font-size:14px;margin-bottom:14px;display:none;}
    .pwdok{background:#F0FDF4;border:1px solid #86EFAC;border-radius:12px;padding:12px 16px;color:#166534;font-size:14px;margin-bottom:14px;display:none;}
    .pwdlbl{display:block;margin-bottom:7px;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;}
    .pwdinp{width:100%;padding:15px 16px;border:1.5px solid #E2E8F0;border-radius:14px;font-size:16px;outline:none;margin-bottom:14px;}
    .pwdinp:focus{border-color:#1565C0;}
    .btnblu{display:block;width:100%;padding:16px;background:#1565C0;color:white;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;}
    .btngry{display:block;width:100%;padding:14px;background:#F1F5F9;color:#475569;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;}
    .banw{background:#FFFBEB;border:1px solid #F59E0B;border-left:5px solid #F59E0B;border-radius:14px;padding:14px 16px;margin-bottom:16px;}
    .banw-t{font-size:13px;font-weight:700;color:#92400E;margin:0 0 4px;}
    .banw-s{font-size:12px;color:#78350F;margin:0 0 10px;}
    #notif{position:fixed;bottom:84px;left:16px;right:16px;background:#10B981;color:white;padding:14px 20px;border-radius:14px;font-weight:700;font-size:14px;text-align:center;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 4px 20px rgba(16,185,129,.4);}
    #notif.show{opacity:1;}
    .empty{text-align:center;padding:40px 20px;color:#94A3B8;}
    .empty-ico{font-size:48px;margin-bottom:12px;} .empty-t{font-size:15px;font-weight:600;}
    .loading{display:flex;align-items:center;justify-content:center;padding:48px;flex-direction:column;gap:16px;}
    .spinner{width:40px;height:40px;border:4px solid #E2E8F0;border-top-color:#1565C0;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div id="login">
  <div class="lcard">
    <div class="lhead">
      <img src="icon-192.png" class="llogo" alt="Logo" onerror="this.style.display='none'">
      <span class="lname">HR Direzione</span>
      <span class="lsub">Sistema Integrato Gruppo F4</span>
    </div>
    <div class="lbody">
      <div id="lerr" class="lerr"></div>
      <label class="lbl" for="lu">Username</label>
      <input type="text" id="lu" class="linp" placeholder="Il tuo username" autocapitalize="none" autocorrect="off" autocomplete="username">
      <label class="lbl" for="lp">Password</label>
      <input type="password" id="lp" class="linp" placeholder="Password" autocomplete="current-password">
      <button class="lbtn" id="lbtn" onclick="doLogin()">Accedi</button>
    </div>
    <div class="lfoot">Accesso riservato al personale autorizzato</div>
  </div>
</div>
<div class="pwdmod" id="pwdmod">
  <div class="pwdinner">
    <p class="pwdtitle">Cambia Password</p>
    <div id="pwderr" class="pwderr"></div>
    <div id="pwdok"  class="pwdok"></div>
    <label class="pwdlbl">Password attuale</label>
    <input type="password" id="pwd1" class="pwdinp" placeholder="Password attuale">
    <label class="pwdlbl">Nuova password (min. 8 car.)</label>
    <input type="password" id="pwd2" class="pwdinp" placeholder="Nuova password">
    <label class="pwdlbl">Conferma nuova password</label>
    <input type="password" id="pwd3" class="pwdinp" placeholder="Conferma">
    <button class="btnblu" onclick="doCambioPwd()">Salva Password</button>
    <button class="btngry" onclick="closePwd()">Annulla</button>
  </div>
</div>
<div class="shov" id="shov" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="shandle"></div>
  <div class="shhdr">
    <span class="shhtitle" id="sht">Dettaglio</span>
    <button class="shclose" onclick="closeSheet()">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>
  <div class="shbody" id="shb"></div>
</div>
<div id="notif"></div>
<div id="app">
  <div class="topbar">
    <img src="icon-192.png" class="tlogo" alt="Logo" onerror="this.style.display='none'">
    <div class="tinfo">
      <div class="ttitle" id="pgtitle">Plancia</div>
      <div class="tsub">Gestionale HR</div>
    </div>
    <div class="tuser" onclick="openPwd()">
      <div class="tav" id="tav">?</div>
      <span class="tnome" id="tnome">-</span>
    </div>
  </div>
  <div id="content"><div class="loading"><div class="spinner"></div></div></div>
  <nav class="bnav">
    <button class="nb act" data-v="home" onclick="goTo('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
    </button>
    <button class="nb" data-v="organigramma" onclick="goTo('organigramma')">
      <svg viewBox="0 0 24 24"><path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3h7z"/></svg>Org.
    </button>
    <button class="nb" data-v="mansionario" onclick="goTo('mansionario')">
      <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>Ruoli
    </button>
    <button class="nb" data-v="comunicazioni" onclick="goTo('comunicazioni')">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>Doc.
    </button>
    <button class="nb" data-v="stampe" onclick="goTo('stampe')">
      <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>Stampe
    </button>
  </nav>
</div>
<script>
var API="https://script.google.com/macros/s/AKfycbxCDvNOgzG896tTvdtolj8tSkK-u8gNBhWE6-VNGSxtUQKRssMH_R2jb2VgWIzsTIQgRA/exec";
var S={token:null,ruolo:null,nome:null};
var ECO=null,STATO_DOC=null,DOCS=[];
function api(p){var qs=Object.keys(p).map(function(k){return k+"="+encodeURIComponent(p[k]);}).join("&");return fetch(API+"?"+qs).then(function(r){return r.json();});}
function showNotif(msg){var el=document.getElementById("notif");el.textContent=msg;el.classList.add("show");setTimeout(function(){el.classList.remove("show");},3000);}
function openSheet(t,h){document.getElementById("sht").textContent=t;document.getElementById("shb").innerHTML=h;document.getElementById("shov").classList.add("open");document.getElementById("sheet").classList.add("open");document.getElementById("sheet").scrollTop=0;}
function closeSheet(){document.getElementById("shov").classList.remove("open");document.getElementById("sheet").classList.remove("open");}
function setTitle(t){document.getElementById("pgtitle").textContent=t;}
function setNav(id){document.querySelectorAll(".nb").forEach(function(b){b.classList.toggle("act",b.getAttribute("data-v")===id);});}
function loading(){document.getElementById("content").innerHTML='<div class="loading"><div class="spinner"></div></div>';}
var PAL=[[207,88,38],[142,70,34],[25,86,42],[262,66,42],[173,74,32],[325,63,40],[43,80,38],[0,68,38],[88,58,34],[195,78,32],[230,68,40],[55,74,35]];
var MAP={};
function hslToHex(h,s,l){l=l/100;var a=s*Math.min(l,1-l)/100;var f=function(n){var k=(n+h/30)%12;var c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,"0");};return "#"+f(0)+f(8)+f(4);}
